# Keep TIP-2 API warm during market hours (IST).
#
# Official docs: on.schedule defaults to UTC; optional timezone: IANA string.
# Minimum interval: every 5 minutes.
#
# Window: Mon–Fri 09:00–15:30 Asia/Kolkata, every 5 min starting at :02
#   → 09:02, 09:07, 09:12, … (not on the hour marks)

name: Keep TIP API warm

on:
  schedule:
    # 09:02–14:57 IST, every 5 minutes, Mon–Fri
    - cron: "2/5 9-14 * * 1-5"
      timezone: Asia/Kolkata
    # 15:02–15:27 IST (stop before/at 15:30), Mon–Fri
    - cron: "2-27/5 15 * * 1-5"
      timezone: Asia/Kolkata
  workflow_dispatch:
    inputs:
      force:
        description: "Ping even outside 09:00–15:30 IST"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  ping:
    name: Ping /api/health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping health (IST window)
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
          FORCE: ${{ inputs.force == 'true' && '1' || '0' }}
        run: |
          chmod +x scripts/ping.sh
          bash scripts/ping.sh
