# Keep TIP-2 API warm during market hours (IST).
#
# GitHub Actions cron is UTC-only. IST = UTC+5:30.
# One schedule: every 3 minutes, Mon–Fri, 04:00–09:59 UTC
#   → 09:30–15:29 IST (≈ 9:30 AM – 3:30 PM IST)
#
# Exact 09:00 IST start needs a second cron (half-hour offset); we keep
# a single job for simplicity. scripts/ping.sh still gates on Asia/Kolkata.
#
# Note: GitHub may delay scheduled runs under load.

name: Keep TIP API warm

on:
  schedule:
    # Mon–Fri every 3 min, 04:00–09:59 UTC = 09:30–15:29 IST
    - cron: "*/3 4-9 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Ping even outside 09:30–15:30 IST"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  ping:
    name: Ping /api/health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping health (IST window)
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
          FORCE: ${{ inputs.force == 'true' && '1' || '0' }}
        run: |
          chmod +x scripts/ping.sh
          bash scripts/ping.sh
