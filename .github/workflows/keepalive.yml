# Keep TIP-2 API warm during market hours (IST).
#
# Official docs (GitHub Actions workflow syntax → on.schedule):
# - Default cron timezone is UTC
# - Optional `timezone:` IANA string (e.g. Asia/Kolkata) — supported since Mar 2026
# - Shortest allowed schedule interval is **every 5 minutes** (not 3)
#
# Note: GitHub may still delay scheduled runs under load.

name: Keep TIP API warm

on:
  schedule:
    # Every 5 minutes, Mon–Fri, 08:00–15:59 Asia/Kolkata
    # (~8 AM – 4 PM IST window; covers pre-open through post-close buffer)
    - cron: "*/5 8-15 * * 1-5"
      timezone: Asia/Kolkata
  workflow_dispatch:
    inputs:
      force:
        description: "Ping even outside 08:00–16:00 IST"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  ping:
    name: Ping /api/health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping health (IST window)
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
          FORCE: ${{ inputs.force == 'true' && '1' || '0' }}
        run: |
          chmod +x scripts/ping.sh
          bash scripts/ping.sh
