# Keep TIP-2 API warm during market hours (IST).
#
# One schedule only. Timezone is Asia/Kolkata (not UTC).
# GitHub minimum interval: 5 minutes.
# Minutes 2,7,12,… so pings are not on the exact hour marks.

name: Keep TIP API warm

on:
  schedule:
    # Mon–Fri, every 5 min, 09:02–15:57 IST
    - cron: "2/5 9-15 * * 1-5"
      timezone: Asia/Kolkata
  workflow_dispatch:
    inputs:
      force:
        description: "Ping even outside 09:00–16:00 IST"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  ping:
    name: Ping /api/health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping health (IST window)
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
          FORCE: ${{ inputs.force == 'true' && '1' || '0' }}
        run: |
          chmod +x scripts/ping.sh
          bash scripts/ping.sh
