# Keep TIP-2 API warm during market hours.
#
# Plain UTC cron only (no timezone: field). GitHub schedules have been
# unreliable with non-standard fields; ping.sh enforces the IST window.
#
# IST = UTC+5:30
#   09:00 IST ≈ 03:30 UTC
#   16:00 IST ≈ 10:30 UTC
# Cron hours 3–10 UTC cover ~08:30–16:30 IST; script skips outside 09–15 IST.

name: TIP API keep-warm

on:
  schedule:
    # Every 5 min, Mon–Fri, 03:00–10:55 UTC (~08:30–16:25 IST)
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Ping even outside Mon–Fri 09:00–16:00 IST"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  ping:
    name: Ping /api/health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping health
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
          FORCE: ${{ inputs.force == 'true' && '1' || '0' }}
        run: |
          chmod +x scripts/ping.sh
          bash scripts/ping.sh
